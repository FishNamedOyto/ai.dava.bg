  <script>
    const translations = {
      bg: { subtitle: 'Инструменти и асистенти с изкуствен интелект', backBtn: 'Назад', copyright: '© {year} Всички права запазени. Създадено с грижа.', bgLang: 'Български', enLang: 'Английски', comingSoon: 'Очаквайте скоро' },
      en: { subtitle: 'Artificial intelligence powered utilities and assistants', backBtn: 'Back', copyright: '© {year} All rights reserved. Built with care.', bgLang: 'Bulgarian', enLang: 'English', comingSoon: 'Coming Soon' }
    };
    let currentLang = 'bg';
    const langBtn = document.getElementById('langBtn'), langMenu = document.getElementById('langMenu'), langLabel = document.getElementById('langLabel'), cardsGrid = document.getElementById('cardsGrid');
    function init() {
      const savedLang = localStorage.getItem('language');
      if (savedLang === 'en' || savedLang === 'bg') currentLang = savedLang;
      const urlParams = new URLSearchParams(window.location.search);
      const urlLang = urlParams.get('lang');
      if (urlLang === 'en' || urlLang === 'bg') currentLang = urlLang;
      updateLanguage(); renderCards(); setupEventListeners();
    }
    function updateLanguage() {
      const t = translations[currentLang];
      document.documentElement.lang = currentLang;
      langLabel.textContent = currentLang.toUpperCase();
      document.querySelectorAll('.lang-option').forEach(btn => btn.classList.toggle('active', btn.dataset.lang === currentLang));
      document.querySelectorAll('[data-text]').forEach(el => { const key = el.dataset.text; if (t[key]) el.textContent = t[key].replace('{year}', new Date().getFullYear()); });
      document.title = 'AI.DAVA.bg - ' + (currentLang === 'bg' ? 'AI Инструменти' : 'AI Tools');
    }
    function renderCards() {
      const t = translations[currentLang];
      cardsGrid.innerHTML = `<div class="coming-soon-card"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg><span class="coming-soon-text">${t.comingSoon}</span></div>`;
    }
    function setupEventListeners() {
      langBtn.addEventListener('click', () => langMenu.classList.toggle('open'));
      document.querySelectorAll('.lang-option').forEach(btn => {
        btn.addEventListener('click', () => {
          currentLang = btn.dataset.lang; localStorage.setItem('language', currentLang); updateLanguage(); renderCards(); langMenu.classList.remove('open');
          const url = new URL(window.location); url.searchParams.set('lang', currentLang); window.history.replaceState({}, '', url);
        });
      });
      document.addEventListener('click', (e) => { if (!e.target.closest('.lang-toggle')) langMenu.classList.remove('open'); });
    }
    init();
  </script>
